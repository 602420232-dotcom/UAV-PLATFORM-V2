name: UAV Platform V2 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # 支持手动触发流水线
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: '部署目标环境'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: '是否跳过测试'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# 并发控制：同一分支的新推送取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Java 编译构建（使用 matrix 策略并行构建各模块）
  # ============================================================
  build-java:
    name: Java Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uav-platform-v2
    strategy:
      matrix:
        module:
          - common-core
          - common-web
          - common-kafka
          - common-security
          - common-resilience
          - api-gateway
          - platform-api
          - weather-api
          - assimilation-api
          - risk-api
          - observation-api
          - planning-api
          - utm-api
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Compile module
        run: mvn compile -pl ${{ matrix.module }} -am -B

      - name: Run Checkstyle
        run: mvn checkstyle:check -pl ${{ matrix.module }} -B
        continue-on-error: true

      - name: Upload module artifact
        if: matrix.module != 'common-core' && matrix.module != 'common-web' && matrix.module != 'common-kafka' && matrix.module != 'common-security' && matrix.module != 'common-resilience'
        uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.module }}-artifact
          path: |
            ${{ matrix.module == 'api-gateway' && 'gateway/api-gateway' || format('services/{0}', matrix.module) }}/target/*.jar
            !**/target/*-original.jar
          retention-days: 3

  # ============================================================
  # Job 2: Python 算法引擎 Lint + 类型检查
  # ============================================================
  build-python:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uav-platform-v2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('python/**/requirements*.txt', 'python/**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint check
        run: ruff check python/

      - name: Ruff format check
        run: ruff format --check python/

      - name: MyPy type check
        run: mypy python/ --ignore-missing-imports

  # ============================================================
  # Job 3: 前端构建
  # ============================================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uav-platform-v2/console
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: uav-platform-v2/console/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('uav-platform-v2/console/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: uav-platform-v2/console/dist
          retention-days: 3

  # ============================================================
  # Job 4: C++ SDK 构建（如果 cmake 可用）
  # ============================================================
  build-cpp:
    name: C++ SDK Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Check for CMakeLists.txt
        id: check_cpp
        run: |
          if find . -name "CMakeLists.txt" -not -path "*/node_modules/*" | grep -q .; then
            echo "has_cpp=true" >> $GITHUB_OUTPUT
          else
            echo "has_cpp=false" >> $GITHUB_OUTPUT
          fi

      - name: Build C++ SDK
        if: steps.check_cpp.outputs.has_cpp == 'true'
        run: |
          CPP_DIR=$(find . -name "CMakeLists.txt" -not -path "*/node_modules/*" | head -1 | xargs dirname)
          echo "Building C++ project in: $CPP_DIR"
          mkdir -p $CPP_DIR/build && cd $CPP_DIR/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

  # ============================================================
  # Job 5: 运行所有测试
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-java, build-python, build-frontend]
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: uav-platform-v2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('python/**/requirements*.txt', 'python/**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Run Java Unit Tests
        run: mvn test -B

      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report -B

      - name: Check JaCoCo Coverage
        run: mvn jacoco:check -B
        continue-on-error: true

      - name: Run Python Tests
        run: |
          pip install pytest pytest-cov
          if [ -f python/requirements.txt ]; then pip install -r python/requirements.txt; fi
          pytest python/ --cov=python --cov-report=xml --cov-report=term-missing -v
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
            coverage.xml
          retention-days: 7

  # ============================================================
  # Job 6: Docker 镜像构建并推送（仅 main 分支）
  # ============================================================
  docker:
    name: Docker Build & Push (${{ matrix.service }})
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - platform-api
          - weather-api
          - assimilation-api
          - risk-api
          - observation-api
          - planning-api
          - utm-api
          - algorithm-engine
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21 for Maven build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download Java build artifacts
        if: matrix.service != 'algorithm-engine'
        uses: actions/download-artifact@v4
        with:
          name: java-${{ matrix.service }}-artifact
          path: target-artifacts

      - name: Extract service JAR
        if: matrix.service != 'algorithm-engine'
        run: |
          mkdir -p uav-platform-v2/services/${{ matrix.service }}/target
          find target-artifacts -name "${{ matrix.service }}*.jar" ! -name "*-original.jar" -exec cp {} uav-platform-v2/services/${{ matrix.service }}/target/ \;

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'algorithm-engine' && 'uav-platform-v2/python/algorithm-engine/Dockerfile' || 'uav-platform-v2/Dockerfile.jre' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.service != 'algorithm-engine' && format('SERVICE_NAME={0}', matrix.service) || '' }}
            ${{ matrix.service != 'algorithm-engine' && format('JAR_FILE=uav-platform-v2/{0}/target/{0}-2.0.0.jar', matrix.service == 'api-gateway' && 'gateway/api-gateway' || format('services/{0}', matrix.service)) || '' }}

  # ============================================================
  # Job 6b: 前端 Docker 镜像构建
  # ============================================================
  docker-frontend:
    name: Docker Build (console)
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: uav-platform-v2/console/dist

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/console
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./uav-platform-v2/console
          file: uav-platform-v2/console/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 7: Docker Compose 部署到灰度环境（仅 main 分支）
  # ============================================================
  deploy:
    name: Deploy to Staging
    needs: [docker, docker-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://staging.uav-platform.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          echo -e "Host staging\n  HostName ${{ secrets.STAGING_HOST }}\n  User ${{ secrets.STAGING_USER }}\n  IdentityFile ~/.ssh/staging_key\n  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy with docker-compose
        run: |
          ssh staging << 'DEPLOY_SCRIPT'
            cd /opt/uav-platform-v2
            git pull origin main
            docker compose pull
            docker compose up -d
            echo "Waiting for services to be healthy..."
            timeout 120 bash -c 'until docker compose ps | grep -v "unhealthy\|starting" | grep -q "running"; do sleep 5; done'
            docker compose ps
          DEPLOY_SCRIPT

      - name: Health check
        run: |
          ssh staging << 'HEALTH_CHECK'
            echo "Checking API Gateway health..."
            curl -sf http://localhost:8088/actuator/health || exit 1
            echo "API Gateway is healthy"

            echo "Checking Prometheus health..."
            curl -sf http://localhost:19091/-/healthy || echo "Prometheus not ready yet"

            echo "Checking Grafana health..."
            curl -sf http://localhost:3001/api/health || echo "Grafana not ready yet"
          HEALTH_CHECK

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment to staging succeeded"
          else
            echo "Deployment to staging failed"
          fi

  # ============================================================
  # 通知：Slack / 邮件通知（模板，需配置 secrets）
  # ============================================================
  notify:
    name: Pipeline Notification
    needs: [build-java, build-python, build-frontend, build-cpp, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine notification message
        id: msg
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
          elif [ "${{ needs.test.result }}" == "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=#ff0000" >> $GITHUB_OUTPUT
          elif [ "${{ needs.test.result }}" == "cancelled" ]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "color=#808080" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "color=#808080" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification (template)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.msg.outputs.color }}",
                  "title": "UAV Platform V2 CI/CD Pipeline ${{ steps.msg.outputs.status }}",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Event", "value": "${{ github.event_name }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true }
                  ],
                  "footer": "UAV Platform V2 CI/CD",
                  "footer_icon": "https://github.githubassets.com/images/mona-loading-dark.gif"
                }
              ]
            }

      - name: Email notification (template)
        if: env.NOTIFICATION_EMAIL != ''
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "UAV Platform V2 CI/CD Pipeline ${{ steps.msg.outputs.status }} - ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Pipeline: ${{ steps.msg.outputs.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
