name: CI - Pull Request Check

# ============================================================
# CI Workflow (PR 检查专用)
# 职责: PR 代码质量门禁 — 编译、Lint、单元测试
# 触发条件: pull_request(main), push(任意分支), 手动触发
# 不做: Docker 构建、部署、E2E、性能压测
# ============================================================

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.14'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Java 编译 + Checkstyle（matrix 并行）
  # ============================================================
  build-java:
    name: Java Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - common-core
          - common-web
          - common-kafka
          - common-security
          - common-resilience
          - api-gateway
          - platform-api
          - weather-api
          - assimilation-api
          - risk-api
          - observation-api
          - planning-api
          - utm-api
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Compile & Checkstyle
        run: |
          MODULE="${{ matrix.module }}"
          case "$MODULE" in
            common-*) MODULE_PATH="common/$MODULE" ;;
            api-gateway) MODULE_PATH="gateway/api-gateway" ;;
            *) MODULE_PATH="services/$MODULE" ;;
          esac
          mvn compile -pl "$MODULE_PATH" -am -B
          mvn checkstyle:check -pl "$MODULE_PATH" -B
        continue-on-error: true

  # ============================================================
  # Job 2: Java 单元测试（全量，利用 Maven 缓存）
  # ============================================================
  test-java:
    name: Java Unit Tests
    runs-on: ubuntu-latest
    needs: build-java
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Run tests
        run: mvn test -B

      - name: JaCoCo coverage
        run: mvn jacoco:report -B
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

  # ============================================================
  # Job 3: Python Lint + 类型检查 + 单元测试
  # ============================================================
  lint-python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('python/**/requirements*.txt', 'python/**/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pytest-asyncio
          if [ -f python/algorithm-engine/requirements.txt ]; then
            pip install -r python/algorithm-engine/requirements.txt
          fi

      - name: Ruff lint
        run: ruff check python/
        continue-on-error: true

      - name: Ruff format
        run: ruff format --check python/
        continue-on-error: true

      - name: MyPy type check
        run: mypy python/ --ignore-missing-imports
        continue-on-error: true

      - name: Run pytest
        if: ${{ !inputs.skip_tests }}
        working-directory: python/algorithm-engine
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        continue-on-error: true

  # ============================================================
  # Job 4: 前端 Lint + 构建 + 单元测试
  # ============================================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: console/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('console/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install & Lint & Test & Build
        working-directory: console
        run: |
          npm ci
          npm run lint
          npm run test || true
          npm run build

  # ============================================================
  # Job 5: C++ SDK 构建（可选）
  # ============================================================
  build-cpp:
    name: C++ SDK Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build C++ SDK
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential
          if find . -name "CMakeLists.txt" -not -path "*/node_modules/*" | grep -q .; then
            CPP_DIR=$(find . -name "CMakeLists.txt" -not -path "*/node_modules/*" | head -1 | xargs dirname)
            mkdir -p "$CPP_DIR/build" && cd "$CPP_DIR/build"
            cmake .. -DCMAKE_BUILD_TYPE=Release
            make -j$(nproc)
          else
            echo "No CMakeLists.txt found, skipping C++ build"
          fi

  # ============================================================
  # 通知（模板，需配置 secrets）
  # ============================================================
  notify:
    name: CI Notification
    needs: [build-java, test-java, lint-python, build-frontend, build-cpp]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        id: msg
        run: |
          if [ "${{ needs.test-java.result }}" == "failure" ] || [ "${{ needs.lint-python.result }}" == "failure" ] || [ "${{ needs.build-frontend.result }}" == "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=#ff0000" >> $GITHUB_OUTPUT
          elif [ "${{ needs.test-java.result }}" == "success" ] && [ "${{ needs.lint-python.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "color=#808080" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.msg.outputs.color }}",
                "title": "CI ${{ steps.msg.outputs.status }}: PR #${{ github.event.pull_request.number }}",
                "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true }
                ],
                "footer": "UAV Platform V2 CI"
              }]
            }
