---
{{- if .Values.algorithmEngine.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: algorithm-engine-hpa
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: algorithm-engine
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: algorithm-engine
  minReplicas: {{ .Values.algorithmEngine.hpa.minReplicas }}
  maxReplicas: {{ .Values.algorithmEngine.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.algorithmEngine.hpa.targetCPUUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
      policies:
        - type: Percent
          value: 100
          periodSeconds: 90
        - type: Pods
          value: 1
          periodSeconds: 90
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
      selectPolicy: Max
{{- end }}
