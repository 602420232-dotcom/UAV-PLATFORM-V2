{{- if .Values.algorithmEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: algorithm-engine
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: algorithm-engine
    app.kubernetes.io/part-of: uav-platform
    app.kubernetes.io/component: algorithm
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.algorithmEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: algorithm-engine
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: algorithm-engine
        app.kubernetes.io/part-of: uav-platform
        app.kubernetes.io/component: algorithm
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.algorithmEngine.containerPort }}"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - algorithm-engine
                topologyKey: kubernetes.io/hostname
      containers:
        - name: algorithm-engine
          image: {{ .Values.global.imageRegistry }}/{{ .Values.algorithmEngine.image.repository }}:{{ .Values.algorithmEngine.image.tag | default .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.algorithmEngine.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.algorithmEngine.containerPort }}
              protocol: TCP
          env:
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: NACOS_SERVER_ADDR
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-secrets
                  key: REDIS_PASSWORD
            - name: ALGORITHM_ENGINE_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: ALGORITHM_ENGINE_KAFKA_BOOTSTRAP_SERVERS
            - name: ALGORITHM_ENGINE_REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: ALGORITHM_ENGINE_REDIS_URL
            - name: ALGORITHM_ENGINE_NACOS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: ALGORITHM_ENGINE_NACOS_HOST
            - name: ALGORITHM_ENGINE_NACOS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: ALGORITHM_ENGINE_NACOS_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "uav-platform.fullname" . }}-config
                  key: LOG_LEVEL
          resources:
            {{- toYaml .Values.algorithmEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.algorithmEngine.containerPort }}
            initialDelaySeconds: {{ .Values.algorithmEngine.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.algorithmEngine.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.algorithmEngine.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.algorithmEngine.livenessProbe.failureThreshold }}
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.algorithmEngine.containerPort }}
            initialDelaySeconds: {{ .Values.algorithmEngine.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.algorithmEngine.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.algorithmEngine.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.algorithmEngine.readinessProbe.failureThreshold }}
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: algorithm-engine
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: algorithm-engine
    app.kubernetes.io/part-of: uav-platform
    app.kubernetes.io/component: algorithm
spec:
  type: {{ .Values.algorithmEngine.service.type }}
  selector:
    app.kubernetes.io/name: algorithm-engine
  ports:
    - name: http
      port: {{ .Values.algorithmEngine.service.port }}
      targetPort: {{ .Values.algorithmEngine.containerPort }}
      protocol: TCP
{{- end }}
