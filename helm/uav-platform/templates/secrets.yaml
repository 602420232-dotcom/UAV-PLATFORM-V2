apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uav-platform.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "uav-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  MYSQL_PASSWORD: {{ .Values.secrets.mysqlPassword | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  NACOS_PASSWORD: {{ .Values.secrets.nacosPassword | b64enc | quote }}
  UTM_SECRET: {{ .Values.secrets.utmSecret | b64enc | quote }}
