apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uav-platform.fullname" . }}-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "uav-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.global.springProfilesActive | quote }}
  NACOS_SERVER_ADDR: "{{ .Values.global.nacos.host }}:{{ .Values.global.nacos.port }}"
  NACOS_NAMESPACE: {{ .Values.global.nacos.namespace | quote }}
  MYSQL_HOST: {{ .Values.global.mysql.host | quote }}
  MYSQL_PORT: {{ .Values.global.mysql.port | quote }}
  MYSQL_USER: {{ .Values.global.mysql.user | quote }}
  REDIS_HOST: {{ .Values.global.redis.host | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  SPRING_DATA_REDIS_HOST: {{ .Values.global.redis.host | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.global.redis.port | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.bootstrapServers | quote }}
  KAFKA_MOCK: {{ .Values.global.kafka.mock | quote }}
  ALGORITHM_ENGINE_URL: {{ .Values.global.algorithmEngine.url | quote }}
  JAVA_OPTS: {{ .Values.global.javaOpts | quote }}
  GATEWAY_JAVA_OPTS: {{ .Values.global.gatewayJavaOpts | quote }}
  ALGORITHM_ENGINE_NACOS_HOST: {{ .Values.global.nacos.host | quote }}
  ALGORITHM_ENGINE_NACOS_PORT: {{ .Values.global.nacos.port | quote }}
  ALGORITHM_ENGINE_REDIS_URL: "redis://{{ .Values.global.redis.host }}:{{ .Values.global.redis.port }}/0"
  ALGORITHM_ENGINE_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.bootstrapServers | quote }}
  LOG_LEVEL: {{ .Values.algorithmEngine.logLevel | quote }}
