# =============================================================================
# Algorithm Engine (Python FastAPI)
# =============================================================================
algorithmEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: algorithm-engine
    tag: ""
    pullPolicy: ""
  containerPort: 9090
  service:
    type: ClusterIP
    port: 9090
  logLevel: "INFO"
  resources:
    requests:
      cpu: "1000m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  livenessProbe:
    httpGet:
      path: /health
      port: 9090
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 9090
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: uav-platform.local
      paths:
        - path: /api/v1
          service: api-gateway
          port: 8088
        - path: /api/v2
          service: api-gateway
          port: 8088
        - path: /api/v1/algorithm
          service: algorithm-engine
          port: 9090
        - path: /api/v2/algorithm
          service: algorithm-engine
          port: 9090
        - path: /
          service: api-gateway
          port: 8088
    - host: api.uav-platform.local
      paths:
        - path: /api/v1
          service: api-gateway
          port: 8088
        - path: /api/v2
          service: api-gateway
          port: 8088
        - path: /api/v1/algorithm
          service: algorithm-engine
          port: 9090
        - path: /api/v2/algorithm
          service: algorithm-engine
          port: 9090
  tls:
    enabled: true
    secretName: uav-platform-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    nginx.ingress.kubernetes.io/limit-connections: "100"
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "32"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "60"
    nginx.ingress.kubernetes.io/upstream-keepalive-requests: "1000"
