# =============================================================================
# Global Configuration
# =============================================================================
global:
  imageRegistry: ghcr.io/602420232-dotcom
  imagePullPolicy: Always
  imageTag: "latest"

  # Environment
  springProfilesActive: "prod"
  namespace: uav-platform

  # Infrastructure addresses (within cluster)
  nacos:
    host: nacos.uav-platform.svc.cluster.local
    port: "8848"
    namespace: "uav-platform"

  mysql:
    host: mysql.uav-platform.svc.cluster.local
    port: "3306"
    user: "root"
    # password should be set via --set or values file

  redis:
    host: redis.uav-platform.svc.cluster.local
    port: "6379"
    # password should be set via --set or values file

  kafka:
    bootstrapServers: kafka.uav-platform.svc.cluster.local:9092
    mock: "false"

  algorithmEngine:
    url: http://algorithm-engine.uav-platform.svc.cluster.local:9090

  # JVM Parameters
  javaOpts: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"
  gatewayJavaOpts: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"

# =============================================================================
# Secrets (set via --set or external secrets management)
# =============================================================================
secrets:
  mysqlPassword: ""
  redisPassword: ""
  jwtSecret: ""
  nacosPassword: ""
  utmSecret: ""
  # TLS
  tlsCert: ""
  tlsKey: ""

# =============================================================================
# Namespace
# =============================================================================
namespace:
  enabled: true
  name: uav-platform

# =============================================================================
# API Gateway
# =============================================================================
apiGateway:
  enabled: true
  replicaCount: 5
  image:
    repository: api-gateway
    tag: ""
    pullPolicy: ""
  containerPort: 8088
  service:
    type: ClusterIP
    port: 8088
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8088
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8088
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Platform API
# =============================================================================
