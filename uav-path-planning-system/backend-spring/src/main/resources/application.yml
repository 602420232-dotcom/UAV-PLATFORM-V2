spring:
  application:
    name: uav-path-planning

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:uav_path_planning}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  cache:
    type: redis

  # Kafka配置
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: uav-path-planning-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

server:
  port: ${SERVER_PORT:8089}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

uav:
  python:
    script-path: ${user.dir}/algorithm-core
    timeout: 30000

  wrf:
    data-path: ${user.dir}/data/wrf
    update-interval: 300

  path-planning:
    max-tasks: 200
    max-drones: 10
    replanning-threshold: 3.0

  grpc:
    host: ${GRPC_HOST:localhost}
    port: ${GRPC_PORT:50051}

utm:
  enabled: ${UTM_ENABLED:false}
  provider: ${UTM_PROVIDER:simulation}
  api:
    base-url: ${UTM_API_BASE_URL:https://api.utm-platform.com/v1}
    key: ${UTM_API_KEY:}
    timeout: 5000

logging:
  level:
    root: info
    "[com.uav]": info

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.uav.model
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
