# ============================================================
# Kafka 批量处理优化配置
# 通过批量处理减少网络IO次数，提升吞吐量
# 适用于高吞吐场景（气象数据流、观测数据流、轨迹数据流）
# ============================================================

spring:
  kafka:
    # ============================================================
    # 消费者批量处理配置
    # ============================================================
    consumer:
      # 单次fetch请求的最小字节数（1KB）
      # 当broker上累积的数据不足此值时，broker将等待更多数据到达后才返回响应
      # 增大此值可以减少fetch请求次数，但会增加延迟
      # 设为1024(1KB)在吞吐量和延迟之间取得平衡
      properties:
        fetch.min.bytes: 1024

        # 单次fetch请求的最大等待时间（毫秒）
        # 当fetch.min.bytes条件未满足时，最多等待此时间后返回当前已有数据
        # 设为100ms，在低流量时避免消费者长时间阻塞
        fetch.max.wait.ms: 100

        # 单次poll调用返回的最大记录数
        # 增大此值可以减少poll调用次数，提高处理效率
        # 但需要确保消费者处理速度跟得上，否则可能导致rebalance
        # 设为500，适合批量处理场景
        max.poll.records: 500

        # 单次poll返回的最大字节数（1MB）
        # 配合max.poll.records使用，防止单次返回数据量过大导致OOM
        max.partition.fetch.bytes: 1048576

        # 消费者本地缓冲区大小（64MB）
        # 用于解压从broker拉取的压缩消息
        receive.buffer.bytes: 67108864

    # ============================================================
    # 生产者批量处理配置
    # ============================================================
    producer:
      # 批量发送的消息字节数阈值（16KB）
      # 当累积的消息总大小达到此值时，立即发送当前批次
      # 较大的batch.size可以提升吞吐量，但会增加内存使用和延迟
      # 16KB是Kafka默认推荐值，适合大多数场景
      properties:
        batch.size: 16384

        # 发送延迟等待时间（毫秒）
        # 即使batch.size未满，也会在等待此时间后发送当前批次
        # 设为5ms，在低流量时也能较快发送消息，同时在高流量时利用批量优势
        linger.ms: 5

        # 生产者可用于缓冲等待发送到服务器的消息总内存（32MB）
        # 当缓冲区满时，send()调用将阻塞（block.on.buffer.full=true）或抛出异常
        # 设为32MB，适合高吞吐场景
        buffer.memory: 33554432

        # 生产者发送缓冲区大小（64MB）
        # 用于TCP发送缓冲，提升网络传输效率
        send.buffer.bytes: 67108864

        # 启用幂等生产者，防止消息重复
        # 开启后Kafka会为每个生产者分配PID和序列号
        enable.idempotence: true

        # 消息压缩类型
        # 使用lz4压缩可以在CPU开销和压缩比之间取得良好平衡
        # 对于气象数据等数值型数据压缩效果较好
        compression.type: lz4

        # 请求超时时间（毫秒）
        # 生产者等待服务器响应的最大时间
        request.timeout.ms: 30000

        # 最大请求大小（4MB）
        # 单个请求中消息批次的最大字节数
        max.request.size: 4194304

    # ============================================================
    # 监听器容器配置
    # ============================================================
    listener:
      # 批量消费模式，每次处理一批消息而非单条
      # 需要配合consumer.max.poll.records使用
      type: batch

      # 批量消费的并发度
      # 增加并发度可以提高处理速度，但需要确保不超过分区数
      concurrency: 3

      # 手动确认模式，确保消息被正确处理后再提交偏移量
      ack-mode: manual_immediate

# ============================================================
# 自定义Kafka批量处理配置
# ============================================================
uav:
  kafka:
    # 是否启用批量处理模式
    batch:
      enabled: true

      # 批量处理线程池大小
      thread-pool-size: 4

      # 批量处理队列容量
      queue-capacity: 1000

      # 单批次最大处理条数（覆盖consumer.max.poll.records）
      max-batch-size: 500

      # 批量处理超时时间（毫秒）
      # 当批次未满但等待时间超过此值时，开始处理当前批次
      batch-timeout-ms: 100

      # 批量处理失败时的重试次数
      retry-count: 3

      # 重试间隔（毫秒）
      retry-interval-ms: 1000
