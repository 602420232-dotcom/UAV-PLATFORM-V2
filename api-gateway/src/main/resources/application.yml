server:
  port: 8088

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  cloud:
    openfeign:
      lazy-attributes-resolution: true
      client:
        config:
          default:
            connectTimeout: 30000
            readTimeout: 30000
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: uav-platform
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/**
        - id: wrf-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/wrf/**
        - id: forecast-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/forecast/**
        - id: planning-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/planning/**
        - id: weather-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/weather/**
        - id: assimilation-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/assimilation/**
      discovery:
        locator:
          enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  observations:
    key-values:
      application: ${spring.application.name:api-gateway}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.server: INFO
