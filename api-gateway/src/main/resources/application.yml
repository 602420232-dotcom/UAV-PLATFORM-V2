server:
  port: 8088

spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 认证路由（无需 JWT 验证，先通过再转发）
        - id: uav-backend-auth
          uri: http://backend-spring:8089
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
          order: -1

        # 平台 API 路由（需要 JWT 验证）
        - id: uav-platform-all
          uri: http://uav-platform:8080
          predicates:
            - Path=/api/**
          filters:
            - name: JwtAuth
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter:
                  replenishRate: 60
                  burstCapacity: 100
            - StripPrefix=0

        # Actuator 健康检查（无需 JWT 验证）
        - id: actuator-health
          uri: http://uav-platform:8080
          predicates:
            - Path=/actuator/**
          filters:
            - StripPrefix=0
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: ${NACOS_NAMESPACE:public}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  observations:
    key-values:
      application: ${spring.application.name:api-gateway}

logging:
  level:
    '[org.springframework.cloud.gateway]': INFO
    '[reactor.netty.http.server]': INFO
