server:
  port: 8088

spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: uav-platform-all
          uri: http://uav-platform:8080
          predicates:
            - Path=/api/**
        - id: actuator-health
          uri: http://uav-platform:8080
          predicates:
            - Path=/actuator/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: ${NACOS_NAMESPACE:public}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  observations:
    key-values:
      application: ${spring.application.name:api-gateway}

logging:
  level:
    '[org.springframework.cloud.gateway]': INFO
    '[reactor.netty.http.server]': INFO
