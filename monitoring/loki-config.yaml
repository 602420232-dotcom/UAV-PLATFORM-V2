# ============================================================
# Loki + Promtail 日志聚合配置 - UAV Platform V2
# ============================================================
# 包含:
#   - Loki 服务配置
#   - Promtail 采集器配置 (采集 Java + Python 服务日志)
#   - 日志标签: service, instance, level, trace_id
# ============================================================

# ============================================================
# Part 1: Loki 服务配置
# ============================================================
# 用法: 作为 docker-compose 中 loki 服务的配置文件挂载
# ============================================================

# --- loki-config.yaml (Loki 服务端) ---
# 将此部分保存为 monitoring/loki-config.yaml 供 Loki 容器使用

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/storage

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 721h
  allow_structured_metadata: false
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 8MB
  per_stream_rate_limit_burst: 16MB

analytics:
  reporting_enabled: false

