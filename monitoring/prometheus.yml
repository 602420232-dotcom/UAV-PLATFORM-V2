# ============================================================
# Prometheus 配置 - UAV Platform V2
# ============================================================
# 采集目标: 8个Java微服务 + 1个Python算法引擎
# 采集间隔: 15s
# 端口说明: 使用Docker网络内容器端口（非宿主机映射端口）
# 当前阶段: 无认证 (后续可添加 basic_auth)
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'uav-platform-v2'
    environment: 'production'

# 告警规则文件
rule_files:
  - 'alert_rules.yml'

# AlertManager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'uav-alertmanager:9093'

# Prometheus 自身监控
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ==========================================================
  # Java 微服务 (Spring Boot Actuator + Micrometer)
  # 端口使用Docker容器内部端口
  # ==========================================================

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-gateway:8088'
        labels:
          service: 'api-gateway'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'platform-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-platform-api:8081'
        labels:
          service: 'platform-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'weather-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-weather-api:8082'
        labels:
          service: 'weather-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'assimilation-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-assimilation-api:8083'
        labels:
          service: 'assimilation-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'risk-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-risk-api:8084'
        labels:
          service: 'risk-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'observation-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-observation-api:8085'
        labels:
          service: 'observation-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'planning-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-planning-api:8086'
        labels:
          service: 'planning-api'
          language: 'java'
          framework: 'spring-boot'

  - job_name: 'utm-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-utm-api:8087'
        labels:
          service: 'utm-api'
          language: 'java'
          framework: 'spring-boot'

  # ==========================================================
  # Python 算法引擎 (FastAPI + Prometheus Client)
  # ==========================================================

  - job_name: 'algorithm-engine'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'uav-algorithm-engine:9090'
        labels:
          service: 'algorithm-engine'
          language: 'python'
          framework: 'fastapi'
