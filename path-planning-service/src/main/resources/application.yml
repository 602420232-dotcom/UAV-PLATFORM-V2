spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: path-planning-service
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/path_planning?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: classpath:health-config.yml

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET}

uav:
  python:
    script-path: /app/python
    timeout: 60000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

planning:
  python-script: three_layer_planner.py
