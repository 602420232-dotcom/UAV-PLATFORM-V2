# ============================================================================
# Docker Compose Production - 生产环境
# ============================================================================
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 生产环境特性：
#   - 资源限制（CPU / 内存）
#   - 副本数配置（可水平扩展）
#   - 日志驱动 json-file + 大小限制（防磁盘写满）
#   - restart: always（自动重启）
#   - Mock 模式关闭
#   - RBAC 启用
#   - Prometheus / Grafana / AlertManager 全部启用
# ============================================================================

services:
  # ============================================================
  # Java 微服务 - 生产环境覆盖
  # ============================================================
  api-gateway:
    image: uav-platform/api-gateway:latest
    build:
      target: production
    environment:
      - SPRING_PROFILES_ACTIVE=prod,docker
      - KAFKA_MOCK=false
      - SECURITY_RBAC_ENABLED=true
      - JAVA_OPTS=-Xms1024m -Xmx2048m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/logs/heapdump.hprof
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 2560M
          cpus: "2.0"
        reservations:
          memory: 1024M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        tag: "uav-gateway"

  platform-api:
