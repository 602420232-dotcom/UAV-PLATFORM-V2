apiVersion: v1
kind: Secret
metadata:
  name: data-assimilation-secrets
  namespace: data-assimilation
type: Opaque
stringData:
  # ⚠️  Kubernetes Secrets 不支持 ${VAR:-} Shell 变量语法！
  # 本文件仅作为参考模版。请通过以下方式注入真实密钥：
  #
  # kubectl create secret generic data-assimilation-secrets -n data-assimilation \
  #   --from-literal=mysql-root-password='<your-password>' \
  #   --from-literal=mysql-password='<your-password>' \
  #   --from-literal=spring.datasource.password='<your-password>' \
  #   --from-literal=redis.password='<your-password>' \
  #   --from-literal=jwt.secret='<your-256-bit-key>' \
  #   --from-literal=weather.api.key='<your-api-key>'
  #
  # 或使用 External Secrets Operator：
  # https://external-secrets.io/latest/
  mysql-root-password: ""
  mysql-password: ""
  spring.datasource.password: ""
  redis.password: ""
  jwt.secret: ""
  weather.api.key: ""
