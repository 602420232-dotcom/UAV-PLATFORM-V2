spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: data-assimilation-service
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/data_assimilation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:***}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false



# 服务器配置
server:
  port: 8084
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 健康检查
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:when-authorized}

# 同化服务配置
assimilation:
  # Python脚本路径
  python-script: /app/src/main/python/bayesian_assimilation.py
  # 处理超时时间
  timeout: 60000
  # 算法参数
  algorithm:
    background-error: 0.1
    observation-error: 0.05
    max-iterations: 100
