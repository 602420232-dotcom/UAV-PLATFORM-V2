# =============================================================================
# UAV Platform V2 - Canary Deployment
# =============================================================================
# 金丝雀发布 Deployment，与稳定版 Deployment 并行运行
# 通过 Nginx Ingress Canary 注解控制流量比例
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-canary
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: uav-platform
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/track: canary
  annotations:
    # 用于 Flagger / 手动金丝雀发布控制器识别
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/track: canary
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: uav-platform
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "2.0.0"
        app.kubernetes.io/track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8088"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          # 金丝雀版本镜像 - 发布时替换为具体版本标签
          image: ghcr.io/602420232-dotcom/api-gateway:canary
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_PROFILES_ACTIVE
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: REDIS_PORT
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_DATA_REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: REDIS_PASSWORD
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: GATEWAY_JAVA_OPTS
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
---
# =============================================================================
# Algorithm Engine Canary Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: algorithm-engine-canary
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: algorithm-engine
    app.kubernetes.io/part-of: uav-platform
    app.kubernetes.io/component: algorithm
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/track: canary
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: algorithm-engine
      app.kubernetes.io/track: canary
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: algorithm-engine
        app.kubernetes.io/part-of: uav-platform
        app.kubernetes.io/component: algorithm
        app.kubernetes.io/version: "2.0.0"
        app.kubernetes.io/track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - algorithm-engine
                topologyKey: kubernetes.io/hostname
      containers:
        - name: algorithm-engine
          image: ghcr.io/602420232-dotcom/algorithm-engine:canary
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
