# =============================================================================
# UAV Platform V2 - Kubernetes Secrets Template
# =============================================================================
# IMPORTANT: This is a template file. Before deploying, replace the placeholder
# values with actual base64-encoded secrets.
#
# To encode a value: echo -n 'your-password' | base64
# Example: echo -n 'mySecurePassword123' | base64
#
# NEVER commit actual secrets to version control!
# Consider using a secrets management tool (e.g., Sealed Secrets, Vault, SOPS)
# for production environments.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: uav-platform-secrets
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: uav-platform
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # MySQL password - replace with base64 encoded value
  # echo -n 'your-mysql-password' | base64
  MYSQL_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_MYSQL_PASSWORD"

  # Redis password - replace with base64 encoded value
  # echo -n 'your-redis-password' | base64
  REDIS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD"

  # JWT Secret - replace with base64 encoded value
  # echo -n 'your-jwt-secret-key' | base64
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_JWT_SECRET"

  # Nacos password - replace with base64 encoded value
  # echo -n 'your-nacos-password' | base64
  NACOS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_NACOS_PASSWORD"

  # UTM Secret - replace with base64 encoded value
  # echo -n 'your-utm-secret' | base64
  UTM_SECRET: "REPLACE_WITH_BASE64_ENCODED_UTM_SECRET"
---
# =============================================================================
# TLS Secret Template (for Ingress HTTPS)
# =============================================================================
# IMPORTANT: Replace with actual TLS certificate and key.
# Generate a self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt -subj "/CN=uav-platform.local"
#   kubectl create secret tls uav-platform-tls \
#     --cert=tls.crt --key=tls.key -n uav-platform
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: uav-platform-tls
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: uav-platform
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # TLS certificate (base64 encoded)
  tls.crt: "REPLACE_WITH_BASE64_ENCODED_TLS_CERT"
  # TLS private key (base64 encoded)
  tls.key: "REPLACE_WITH_BASE64_ENCODED_TLS_KEY"
