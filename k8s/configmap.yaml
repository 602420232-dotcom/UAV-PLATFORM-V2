apiVersion: v1
kind: ConfigMap
metadata:
  name: uav-platform-config
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: uav-platform
    app.kubernetes.io/component: config
data:
  # Spring Profile
  SPRING_PROFILES_ACTIVE: "prod"

  # Nacos
  NACOS_SERVER_ADDR: "nacos.uav-platform.svc.cluster.local:8848"
  NACOS_NAMESPACE: "uav-platform"

  # MySQL
  MYSQL_HOST: "mysql.uav-platform.svc.cluster.local"
  MYSQL_PORT: "3306"
  MYSQL_USER: "root"

  # Redis
  REDIS_HOST: "redis.uav-platform.svc.cluster.local"
  REDIS_PORT: "6379"
  SPRING_DATA_REDIS_HOST: "redis.uav-platform.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka.uav-platform.svc.cluster.local:9092"
  KAFKA_MOCK: "false"

  # Algorithm Engine
  ALGORITHM_ENGINE_URL: "http://algorithm-engine.uav-platform.svc.cluster.local:9090"

  # JVM Parameters (Java Services)
  JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"

  # Gateway JVM Parameters
  GATEWAY_JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"

  # Algorithm Engine (Python)
  ALGORITHM_ENGINE_NACOS_HOST: "nacos.uav-platform.svc.cluster.local"
  ALGORITHM_ENGINE_NACOS_PORT: "8848"
  ALGORITHM_ENGINE_REDIS_URL: "redis://redis.uav-platform.svc.cluster.local:6379/0"
  ALGORITHM_ENGINE_KAFKA_BOOTSTRAP_SERVERS: "kafka.uav-platform.svc.cluster.local:9092"
  LOG_LEVEL: "INFO"

  # Datasource URLs
  SPRING_DATASOURCE_PLATFORM_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_ASSIMILATION_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_assimilation?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_OBSERVATION_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_observation?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_PLANNING_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_planning?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_UTM_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_utm?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_RISK_URL: "jdbc:mysql://mysql.uav-platform.svc.cluster.local:3306/uav_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
