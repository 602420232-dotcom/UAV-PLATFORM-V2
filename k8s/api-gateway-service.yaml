apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: uav-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: uav-platform
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      protocol: TCP
