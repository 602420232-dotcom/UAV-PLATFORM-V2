                    cpu: "500m"
                    memory: "512Mi"
                  limits:
                    cpu: "1000m"
                    memory: "1Gi"

  - target:
      kind: Deployment
      name: risk-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
