[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "*.pyc",
    "*.pyo",
    "node_modules",
    "*.egg-info",
]

[tool.pyright]
typeCheckingMode = "basic"
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    "**/*.pyo",
    "node_modules",
]

[tool.basedpyright]
typeCheckingMode = "basic"
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    "**/*.pyo",
    "node_modules",
]

[tool.autoflake]
remove-all-unused-imports = true
remove-unused-variables = true

[tool.autopep8]
max-line-length = 100
aggressive = 2