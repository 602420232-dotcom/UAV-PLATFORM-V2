apiVersion: apps/v1
kind: Deployment
metadata:
  name: uav-weather-collector
  namespace: uav-platform
  labels:
    app: uav-weather-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uav-weather-collector
  template:
    metadata:
      labels:
        app: uav-weather-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: weather-collector
          image: trae-uav-weather-collector:latest
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: uav-platform-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_DATASOURCE_URL_UAV_WEATHER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: spring.datasource.password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: spring.datasource.password
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: redis.password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: redis.password
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: JAVA_OPTS_UAV_WEATHER
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 200m }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: uav-weather-collector
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: uav-weather-collector
  ports:
    - name: http
      port: 8086
      targetPort: 8086
