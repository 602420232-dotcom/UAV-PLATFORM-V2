﻿﻿﻿apiVersion: apps/v1
kind: Deployment
metadata:
  name: uav-platform-service
  namespace: uav-platform
  labels:
    app: uav-platform-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uav-platform-service
  template:
    metadata:
      labels:
        app: uav-platform-service
    spec:
      containers:
      - name: uav-platform-service
        image: trae-uav-platform:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: uav-platform-config
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: uav-platform-config
              key: SPRING_DATASOURCE_URL_UAV_PLATFORM
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: spring.datasource.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: spring.datasource.password
        - name: SPRING_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: redis.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: jwt.secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: spring.datasource.password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: uav-platform-secrets
              key: redis.password
        - name: WRF_PROCESSOR_URL
          valueFrom:
            configMapKeyRef:
              name: uav-platform-config
              key: SERVICES_WRF_PROCESSOR_URL
        - name: METEOR_FORECAST_URL
          valueFrom:
            configMapKeyRef:
              name: uav-platform-config
              key: SERVICES_METEOR_FORECAST_URL
        - name: PATH_PLANNING_URL
          valueFrom:
            configMapKeyRef:
              name: uav-platform-config
              key: SERVICES_PATH_PLANNING_URL
        - name: JAVA_OPTS
          valueFrom:
            configMapKeyRef:
              name: uav-platform-config
              key: JAVA_OPTS_UAV_PLATFORM
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1536Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: uav-platform-service
  namespace: uav-platform
spec:
  selector:
    app: uav-platform-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
