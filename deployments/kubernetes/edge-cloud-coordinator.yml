apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-cloud-coordinator
  namespace: uav-platform
  labels:
    app: edge-cloud-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-cloud-coordinator
  template:
    metadata:
      labels:
        app: edge-cloud-coordinator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: coordinator
          image: trae-edge-cloud-coordinator:latest
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8765
              name: ws
          envFrom:
            - configMapRef:
                name: uav-platform-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: redis.password
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 200m }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: edge-cloud-coordinator
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: edge-cloud-coordinator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: ws
      port: 8765
      targetPort: 8765
