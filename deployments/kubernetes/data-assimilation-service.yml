apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-assimilation-service
  namespace: uav-platform
  labels:
    app: data-assimilation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-assimilation-service
  template:
    metadata:
      labels:
        app: data-assimilation-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: data-assimilation
          image: trae-data-assimilation:latest
          ports:
            - containerPort: 8084
              name: http
          envFrom:
            - configMapRef:
                name: uav-platform-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_DATASOURCE_URL_DATA_ASSIMILATION
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: spring.datasource.password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-platform-secrets
                  key: spring.datasource.password
            - name: PYTHON_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: PYTHON_TIMEOUT_ASSIMILATION
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: JAVA_OPTS_DATA_ASSIMILATION
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8084 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8084 }
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            limits: { memory: 2Gi, cpu: 2000m }
            requests: { memory: 1Gi, cpu: 500m }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: data-assimilation-service
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: data-assimilation-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
