apiVersion: apps/v1
kind: Deployment
metadata:
  name: wrf-processor-service
  namespace: uav-platform
  labels:
    app: wrf-processor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wrf-processor-service
  template:
    metadata:
      labels:
        app: wrf-processor-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: wrf-processor
          image: trae-wrf-processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: uav-platform-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: SPRING_DATASOURCE_URL_WRF_PROCESSOR
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: spring.datasource.password
                  name: uav-platform-secrets
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: spring.datasource.password
                  name: uav-platform-secrets
            - name: PYTHON_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: PYTHON_TIMEOUT_WRF
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: JAVA_OPTS_WRF_PROCESSOR
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: wrf-processor-service
  namespace: uav-platform
spec:
  selector:
    app: wrf-processor-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
