# 持久卷声明配置
# 注意：MySQL和Redis的PVC现在通过StatefulSet的volumeClaimTemplates管理

# WRF数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wrf-data-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
# 输出数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: output-data-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
# 模型数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-data-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: standard
---
# 预报数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forecast-data-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
# 配置数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config-data-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
---
# 备份存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: uav-platform
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
