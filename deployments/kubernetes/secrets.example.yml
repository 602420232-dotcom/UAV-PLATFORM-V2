# 注意：此文件为模板示例，所有占位符值需要在生产环境替换
# 使用前请：
# 1. 将此文件复制为 secrets.yml（已加入 .gitignore）
# 2. 使用以下命令生成真实 base64 值：
#    echo -n "your_secure_value" | base64
# 3. 粘贴到 secrets.yml 对应字段
# 4. 不要将 secrets.yml 提交到版本控制系统
#
# 监控栈 Secrets 请参考 monitoring-secrets.yml

apiVersion: v1
kind: Secret
metadata:
  name: uav-platform-secrets
  namespace: uav-platform
type: Opaque
data:
  # ⚠️ 生产环境必须替换以下所有值
  # 数据库密码 - 生成方式: echo -n "your_password" | base64
  spring.datasource.password: ${DB_PASSWORD_BASE64}

  # Redis 密码
  redis.password: ${REDIS_PASSWORD_BASE64}

  # JWT 签名密钥（建议 256+ 位随机值）
  jwt.secret: ${JWT_SECRET_BASE64}

  # 加密密钥
  encryption.key: ${ENCRYPTION_KEY_BASE64}

  # 安全用户密码
  security.user.password: ${SECURITY_USER_PASSWORD_BASE64}
